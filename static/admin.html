<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>当別町 ごみ収集カレンダー管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .day-cell {
      min-height: 70px;
      cursor: pointer;
      transition: filter 0.1s;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 8px;
      padding-bottom: 4px;
    }
    .day-cell:hover { filter: brightness(0.93); }
    .empty-cell { min-height: 70px; background: #f9fafb; }

    /* 背景: 燃えないごみ → 水色, 燃やせないごみ → ピンク */
    .bg-moenai    { background-color: #bfdbfe !important; }
    .bg-moyasenai { background-color: #fbcfe8 !important; }
    .bg-both      { background: linear-gradient(135deg, #bfdbfe 50%, #fbcfe8 50%) !important; }

    /* 例外日: 左に黄色ボーダー */
    .exception-day { border-left: 3px solid #f59e0b !important; }

    /* 日付インジケータ: 数字をぴったり囲うサイズ */
    .date-circle, .date-square, .date-today, .date-plain {
      display: inline-flex;
      width: 38px; height: 38px;
      align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700; line-height: 1;
    }
    .date-circle {
      border-radius: 50%;
      border: 2.5px solid #ef4444;
      /* 文字色は曜日ルールで付与 */
    }
    .date-square {
      border: 2.5px solid #2563eb;
      /* 文字色は曜日ルールで付与 */
    }
    /* 今日: グリーン二重丸（border＋outline） */
    .date-today {
      border-radius: 50%;
      border: 2.5px solid #16a34a;
      outline: 2.5px solid #16a34a;
      outline-offset: 3px;
      /* 文字色は曜日ルールで付与 */
    }
    /* 今日 ＋ 赤丸/青四角: 既存の枠にグリーンoutlineを追加 */
    .today-outline {
      outline: 2.5px solid #16a34a !important;
      outline-offset: 3px;
    }
    .date-red  { color: #dc2626; }
    .date-blue { color: #2563eb; }
    .date-dark { color: #1f2937; }

    .spray-label {
      font-size: 8px; color: #6b7280; background: #f3f4f6;
      padding: 1px 3px; border-radius: 3px; display: inline-block; margin-top: 2px;
    }
    .exc-mark { font-size: 9px; color: #f59e0b; position: absolute; top: 3px; right: 4px; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">

<!-- ログイン画面 -->
<div id="login-overlay" class="fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center z-[100]">
  <div class="bg-white rounded-2xl shadow-2xl p-8 w-80 max-w-full mx-4">
    <div class="text-center mb-6">
      <div class="text-4xl mb-2">🔐</div>
      <h2 class="text-xl font-bold text-gray-800">管理画面ログイン</h2>
      <p class="text-xs text-gray-400 mt-1">当別町 ごみ収集カレンダー</p>
    </div>
    <div class="space-y-3">
      <input id="login-password" type="password" placeholder="パスワード"
             autocomplete="current-password"
             class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
             onkeydown="if(event.key==='Enter')login()">
      <p id="login-error" class="text-red-500 text-xs text-center hidden">パスワードが違います</p>
      <button onclick="login()"
              class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2.5 rounded-lg text-sm font-medium transition-colors">
        ログイン
      </button>
    </div>
  </div>
</div>

<div class="max-w-3xl mx-auto p-3">

  <!-- タイトル -->
  <div class="flex items-center justify-between mb-3">
    <h1 class="text-lg font-bold text-gray-800">当別町 ごみ収集カレンダー管理</h1>
    <button onclick="logout()" title="ログアウト"
            class="text-xs text-gray-400 hover:text-gray-600 px-2 py-1 rounded-lg hover:bg-gray-200 transition-colors">
      🔓 ログアウト
    </button>
  </div>

  <!-- 地区タブ -->
  <div class="flex gap-2 mb-2">
    <button id="tab-1" onclick="setDistrict(1)" class="flex-1 py-2 rounded-lg font-medium text-sm">1地区</button>
    <button id="tab-2" onclick="setDistrict(2)" class="flex-1 py-2 rounded-lg font-medium text-sm">2地区</button>
    <button id="tab-3" onclick="setDistrict(3)" class="flex-1 py-2 rounded-lg font-medium text-sm">3地区</button>
    <button id="tab-4" onclick="setDistrict(4)" class="flex-1 py-2 rounded-lg font-medium text-sm">4地区</button>
  </div>

  <!-- ビュー切替 -->
  <div class="flex gap-2 mb-2">
    <button id="btn-month"     onclick="setView('month')"     class="flex-1 py-1.5 rounded-lg text-sm font-medium">📅 月表示</button>
    <button id="btn-year"      onclick="setView('year')"      class="flex-1 py-1.5 rounded-lg text-sm font-medium">🗓 年間</button>
    <button id="btn-broadcast" onclick="setView('broadcast')" class="flex-1 py-1.5 rounded-lg text-sm font-medium">📢 広告</button>
  </div>

  <!-- ===== 月表示 ===== -->
  <div id="month-view">
    <!-- 月ナビ -->
    <div class="flex items-center justify-between bg-white rounded-xl px-4 py-2 mb-2 shadow-sm">
      <button onclick="prevMonth()" class="text-2xl text-gray-400 hover:text-gray-700 w-8">‹</button>
      <span id="month-title" class="text-lg font-semibold text-gray-800"></span>
      <button onclick="nextMonth()" class="text-2xl text-gray-400 hover:text-gray-700 w-8 text-right">›</button>
    </div>
    <!-- カレンダー -->
    <div class="bg-white rounded-xl shadow-sm overflow-hidden mb-3">
      <div class="grid grid-cols-7 bg-gray-50 border-b border-gray-100">
        <div class="text-center py-1.5 text-xs font-bold text-red-500">日</div>
        <div class="text-center py-1.5 text-xs font-bold text-gray-600">月</div>
        <div class="text-center py-1.5 text-xs font-bold text-gray-600">火</div>
        <div class="text-center py-1.5 text-xs font-bold text-gray-600">水</div>
        <div class="text-center py-1.5 text-xs font-bold text-gray-600">木</div>
        <div class="text-center py-1.5 text-xs font-bold text-gray-600">金</div>
        <div class="text-center py-1.5 text-xs font-bold text-blue-500">土</div>
      </div>
      <div id="calendar-grid" class="grid grid-cols-7 gap-px bg-gray-200"></div>
    </div>
  </div>

  <!-- ===== 年間プレビュー ===== -->
  <div id="year-view" class="hidden">
    <div class="flex items-center justify-between bg-white rounded-xl px-4 py-2 mb-2 shadow-sm">
      <button onclick="prevFiscalYear()" class="text-2xl text-gray-400 hover:text-gray-700 w-8">‹</button>

  <div id="broadcast-view" class="hidden space-y-3">

    <!-- 新規作成フォーム -->

      <button onclick="toggleNewForm()"
              class="w-full flex items-center justify-between px-4 py-3 text-sm font-semibold text-gray-800 hover:bg-gray-50">
        <span>＋ 新規広告スケジュール</span>
        <span id="form-toggle-icon" class="text-gray-400">▼</span>
      </button>
      <div id="new-broadcast-form" class="hidden px-4 pb-4 border-t border-gray-100 space-y-3 pt-3">

        <div>
          <label class="text-xs font-medium text-gray-600">名前</label>
          <input id="bc-name" type="text" placeholder="例: 月初キャンペーン"
                 class="mt-1 w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <div>
          <label class="text-xs font-medium text-gray-600">種類</label>
          <div class="mt-1 flex gap-3">
            <label class="flex items-center gap-1.5 cursor-pointer">
              <input type="radio" name="bc-type" value="text" checked onchange="updateBcFields()" class="accent-blue-500">
              <span class="text-sm text-gray-700">テキスト</span>
            </label>
            <label class="flex items-center gap-1.5 cursor-pointer">
              <input type="radio" name="bc-type" value="image" onchange="updateBcFields()" class="accent-blue-500">
              <span class="text-sm text-gray-700">画像バナー</span>

          </div>
        </div>

        <div id="bc-text-field">
          <label class="text-xs font-medium text-gray-600">テキスト内容</label>

        </div>

        <div id="bc-image-fields" class="hidden space-y-2">
          <div>

          </div>
          <div>
            <label class="text-xs font-medium text-gray-600">プレビューURL（省略可・同じURLでも可）</label>
            <input id="bc-preview-url" type="url" placeholder="https://example.com/banner_preview.jpg"
                   class="mt-1 w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="text-xs font-medium text-gray-600">配信スケジュール</label>
            <select id="bc-schedule" onchange="updateBcFields()"
                    class="mt-1 w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
              <option value="weekly">週１</option>
              <option value="biweekly">隔週</option>
              <option value="monthly">月１</option>
            </select>
          </div>
          <div>
            <label class="text-xs font-medium text-gray-600">配信時刻</label>
            <select id="bc-hour"
                    class="mt-1 w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
              <option value="6">6時</option>
              <option value="7">7時</option>
              <option value="8">8時</option>
              <option value="9" selected>9時</option>
              <option value="10">10時</option>
              <option value="11">11時</option>
              <option value="12">12時</option>
              <option value="18">18時</option>
              <option value="19">19時</option>
              <option value="20">20時</option>
              <option value="21">21時</option>
            </select>
          </div>
        </div>

        <div id="bc-dow-field">
          <label class="text-xs font-medium text-gray-600">曜日</label>
          <select id="bc-dow"
                  class="mt-1 w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">

            <option value="2">水曜日</option>

            <option value="4">金曜日</option>

            <option value="6">日曜日</option>

        <div id="bc-dom-field" class="hidden">

            ${Array.from({length:28},(_,i)=>`<option value="${i+1}">${i+1}日</option>`).join('')}
          </select>

        <button onclick="createBroadcast()"
                class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2.5 rounded-lg text-sm font-medium transition-colors">
          スケジュール登録

      </div>
    </div>

    <!-- 登録済み一覧 -->
    <div id="broadcast-list"></div>
    <p id="broadcast-empty" class="text-center text-gray-400 text-sm py-6 hidden">登録されたスケジュールはありません</p>

  </div>

  <!-- 凡例 -->
  <div class="bg-white rounded-xl px-4 py-2.5 shadow-sm">
    <div class="flex flex-wrap gap-3 items-center text-xs">
      <span class="flex items-center gap-1">
        <span style="display:inline-flex;min-width:24px;height:24px;padding:0 3px;border-radius:50%;border:2px solid #ef4444;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#dc2626">例</span>
        <span class="text-gray-600">燃やせるごみ</span>
      </span>
      <span class="flex items-center gap-1">

        <span class="text-gray-600">スプレー缶</span>
      </span>
      <span class="flex items-center gap-1">
        <span class="exc-mark font-bold">⚠</span>
        <span class="text-gray-600">例外設定あり</span>
      </span>
      <span class="flex items-center gap-1">
        <span style="display:inline-flex;width:22px;height:22px;border-radius:50%;border:2px solid #16a34a;outline:2px solid #16a34a;outline-offset:2px;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#15803d">例</span>
        <span class="text-gray-600">今日</span>
      </span>

</div>

<!-- 編集モーダル -->
<div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50"
     onclick="closeModalBackdrop(event)">
  <div class="bg-white rounded-2xl shadow-2xl p-5 w-72 max-w-full mx-4" onclick="event.stopPropagation()">
    <h3 id="modal-title" class="text-sm font-bold text-gray-800 mb-0.5"></h3>
    <div id="modal-holiday" class="text-red-400 text-xs mb-2 hidden"></div>
    <div class="border-t border-gray-100 pt-3 mb-4">
      <div id="modal-checkboxes" class="space-y-1.5"></div>
    </div>
    <div class="flex flex-col gap-1.5">
      <div class="flex gap-2">
        <button onclick="saveCorrection()"
          class="flex-1 bg-blue-500 hover:bg-blue-600 text-white py-2 rounded-lg text-sm font-medium">保存</button>
        <button onclick="closeModal()"
          class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 py-2 rounded-lg text-sm font-medium">閉じる</button>
      </div>
      <div class="flex gap-2">
        <button onclick="setNoCollection()"
          class="flex-1 bg-gray-400 hover:bg-gray-500 text-white py-1.5 rounded-lg text-xs">収集なし</button>
        <button onclick="revertToRule()"
          class="flex-1 bg-yellow-400 hover:bg-yellow-500 text-white py-1.5 rounded-lg text-xs">ルールに戻す</button>
      </div>
    </div>
  </div>
</div>

<script>
const GARBAGE_TYPES = ['燃やせるごみ', '燃えないごみ', '燃やせないごみ', '資源物', 'スプレー缶'];
const WEEKDAY_JP = ['日','月','火','水','木','金','土'];

let district = 3, year = new Date().getFullYear(), month = new Date().getMonth() + 1;
let scheduleData = {}, editingDate = null, view = 'month';
let fyOffset = 0; // 年間プレビューの年度オフセット（0=今年度, 1=翌年度, -1=前年度）

const _t = new Date();
const todayKey = `${_t.getFullYear()}-${String(_t.getMonth()+1).padStart(2,'0')}-${String(_t.getDate()).padStart(2,'0')}`;

// ------------------------------------------------------------------ //
//  認証                                                               //
// ------------------------------------------------------------------ //
const TOKEN_KEY  = 'tobetsu_admin_token';
const getToken   = () => localStorage.getItem(TOKEN_KEY);
const setToken   = (t) => localStorage.setItem(TOKEN_KEY, t);
const clearToken = () => localStorage.removeItem(TOKEN_KEY);

function authFetch(url, options = {}) {
  const token = getToken();
  if (token) options.headers = { ...options.headers, 'Authorization': `Bearer ${token}` };
  return fetch(url, options);
}

async function checkAuth() {
  const token = getToken();
  const res = await fetch('/admin/check', {
    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
  });
  const { valid, auth_required } = await res.json();
  if (!auth_required || valid) {
    document.getElementById('login-overlay').classList.add('hidden');
    setDistrict(3);
  }
  // 未認証の場合はオーバーレイをそのまま表示
}

async function login() {
  const password = document.getElementById('login-password').value;
  const res = await fetch('/admin/login', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password }),
  });
  if (res.ok) {
    const { token } = await res.json();
    setToken(token);
    document.getElementById('login-error').classList.add('hidden');
    document.getElementById('login-overlay').classList.add('hidden');
    setDistrict(3);
  } else {
    document.getElementById('login-error').classList.remove('hidden');
    document.getElementById('login-password').select();
  }
}

function logout() {
  clearToken();
  document.getElementById('login-overlay').classList.remove('hidden');
  document.getElementById('login-password').value = '';
}

checkAuth();

// ------------------------------------------------------------------ //
//  ビュー切替                                                          //
// ------------------------------------------------------------------ //
function setView(v) {
  view = v;
  document.getElementById('month-view').classList.toggle('hidden', v !== 'month');
  document.getElementById('year-view').classList.toggle('hidden',  v !== 'year');
  document.getElementById('broadcast-view').classList.toggle('hidden', v !== 'broadcast');
  // 地区タブはカレンダービューのみ表示
  document.querySelectorAll('[id^="tab-"]').forEach(el => el.parentElement.classList.toggle('hidden', v === 'broadcast'));
  const act = 'flex-1 py-1.5 rounded-lg text-sm font-medium bg-blue-500 text-white';
  const def = 'flex-1 py-1.5 rounded-lg text-sm font-medium bg-white text-gray-600 hover:bg-gray-100';
  document.getElementById('btn-month').className     = v === 'month'     ? act : def;
  document.getElementById('btn-year').className      = v === 'year'      ? act : def;
  document.getElementById('btn-broadcast').className = v === 'broadcast' ? act : def;
  if (v === 'year') {
    const currentFY = month >= 4 ? year : year - 1;
    fyOffset = currentFY - baseFiscalYear();
    loadYearView();
  }
  if (v === 'broadcast') loadBroadcasts();
}

// ------------------------------------------------------------------ //
//  年間プレビュー                                                      //
// ------------------------------------------------------------------ //
function baseFiscalYear() {
  const now = new Date();
  return now.getMonth() + 1 >= 4 ? now.getFullYear() : now.getFullYear() - 1;
}
function fiscalStart() {
  return baseFiscalYear() + fyOffset;
}
function prevFiscalYear() { fyOffset--; loadYearView(); }
function nextFiscalYear() { fyOffset++; loadYearView(); }

function fiscalMonths() {
  const fy = fiscalStart();
  const months = [];
  for (let i = 0; i < 12; i++) {
    const m = (i + 3) % 12 + 1;           // 4,5,...,12,1,2,3
    const y = fy + (i < 9 ? 0 : 1);
    months.push({ year: y, month: m });
  }
  return months;
}

async function loadYearView() {
  const fy = fiscalStart();
  document.getElementById('year-title').textContent = `${fy}年度（${fy}年4月〜${fy+1}年3月）`;

  const months = fiscalMonths();
  const results = await Promise.all(
    months.map(({ year: y, month: m }) =>
      authFetch(`/api/schedule?district=${district}&year=${y}&month=${m}`)
        .then(r => r.json()).then(data => ({ year: y, month: m, data }))
    )
  );

  const grid = document.getElementById('year-grid');
  grid.innerHTML = '';
  results.forEach(({ year: y, month: m, data }) => {
    grid.appendChild(buildMiniCalendar(y, m, data));
  });
}

function buildMiniCalendar(y, m, data) {
  const wrap = document.createElement('div');
  wrap.className = 'bg-white rounded-lg shadow-sm overflow-hidden cursor-pointer hover:shadow-md transition-shadow border border-gray-100';
  wrap.onclick = () => {
    year = y; month = m;
    setView('month');
    loadSchedule();
  };

  // ヘッダー
  const hdr = document.createElement('div');
  hdr.className = 'bg-gray-100 text-center py-1 text-xs font-bold text-gray-700';
  hdr.textContent = `${y}年${m}月`;
  wrap.appendChild(hdr);

  // グリッド
  const grid = document.createElement('div');
  grid.className = 'grid grid-cols-7 gap-px bg-gray-200 p-px';

  // 曜日ヘッダー
  ['日','月','火','水','木','金','土'].forEach((w, i) => {
    const el = document.createElement('div');
    el.style.cssText = 'background:#f9fafb;text-align:center;font-size:7px;font-weight:700;padding:1px 0;';
    el.style.color = i === 0 ? '#ef4444' : i === 6 ? '#2563eb' : '#6b7280';
    el.textContent = w;
    grid.appendChild(el);
  });

  // 空セル
  const firstDay = new Date(y, m - 1, 1).getDay();
  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.style.cssText = 'background:#f9fafb;min-height:18px;';
    grid.appendChild(el);
  }

  // 日付セル
  const daysInMonth = new Date(y, m, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const key = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const info = data[key] || { types: [], is_holiday: false, is_exception: false };
    const dow = new Date(y, m - 1, d).getDay();
    grid.appendChild(buildMiniCell(d, info, dow, key === todayKey));
  }

  wrap.appendChild(grid);
  return wrap;
}

function buildMiniCell(day, info, dow, isToday) {
  const cell = document.createElement('div');
  cell.style.cssText = 'min-height:18px;display:flex;align-items:center;justify-content:center;background:#fff;position:relative;';

  const types  = info.types || [];
  const hasMoeru     = types.includes('燃やせるごみ');
  const hasShigen    = types.includes('資源物');
  const hasMoenai    = types.includes('燃えないごみ');
  const hasMoyasenai = types.includes('燃やせないごみ');

  // 背景色
  if (hasMoenai && hasMoyasenai)
    cell.style.background = 'linear-gradient(135deg, #bfdbfe 50%, #fbcfe8 50%)';
  else if (hasMoenai)     cell.style.background = '#bfdbfe';
  else if (hasMoyasenai)  cell.style.background = '#fbcfe8';

  // 例外: 左ボーダー
  if (info.is_exception) cell.style.borderLeft = '2px solid #f59e0b';

  // 数字インジケータ
  const span = document.createElement('span');
  const SZ = 'width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;';

  // 文字色は曜日で固定（日=赤, 土=青, 平日=黒）
  let color = '#374151';
  if (dow === 0 || info.is_holiday) color = '#dc2626';
  else if (dow === 6)               color = '#2563eb';

  if (isToday) {
    span.style.cssText = SZ + `border-radius:50%;border:1.5px solid #16a34a;outline:1.5px solid #16a34a;outline-offset:1px;color:${color};`;
  } else if (hasMoeru) {
    span.style.cssText = SZ + `border-radius:50%;border:1.5px solid #ef4444;color:${color};`;
  } else if (hasShigen) {
    span.style.cssText = SZ + `border:1.5px solid #2563eb;color:${color};`;
  } else {
    span.style.cssText = SZ + `color:${color};`;
  }
  span.textContent = day;
  cell.appendChild(span);
  return cell;
}

// ------------------------------------------------------------------ //

function setDistrict(d) {
  district = d;
  [1,2,3,4].forEach(i => {
    const btn = document.getElementById(`tab-${i}`);
    btn.className = i === d
      ? 'flex-1 py-2 rounded-lg font-medium text-sm bg-blue-500 text-white'
      : 'flex-1 py-2 rounded-lg font-medium text-sm bg-white text-gray-600 hover:bg-gray-100';
  });
  if (view === 'year') loadYearView();
  else loadSchedule();
}

async function loadSchedule() {
  const res = await authFetch(`/api/schedule?district=${district}&year=${year}&month=${month}`);
  scheduleData = await res.json();
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('month-title').textContent = `${year}年${month}月`;
  const grid = document.getElementById('calendar-grid');
  grid.innerHTML = '';

  const firstDay = new Date(year, month - 1, 1).getDay();
  const daysInMonth = new Date(year, month, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'empty-cell';
    grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const key = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const info = scheduleData[key] || { types: [], is_exception: false, is_holiday: false, holiday_name: '' };
    const dow = new Date(year, month - 1, d).getDay();

    const types = info.types;
    const hasMoeru    = types.includes('燃やせるごみ');
    const hasShigen   = types.includes('資源物');
    const hasMoenai   = types.includes('燃えないごみ');
    const hasMoyasenai= types.includes('燃やせないごみ');
    const hasSpray    = types.includes('スプレー缶');

    // 背景色
    let bgClass = '';
    if (hasMoenai && hasMoyasenai) bgClass = 'bg-both';
    else if (hasMoenai)            bgClass = 'bg-moenai';
    else if (hasMoyasenai)         bgClass = 'bg-moyasenai';

    const cell = document.createElement('div');
    cell.className = [
      'day-cell p-1',
      bgClass || 'bg-white',
      info.is_exception ? 'exception-day' : '',
    ].filter(Boolean).join(' ');
    cell.onclick = () => openModal(key, d, dow, info);

    // 日付数字の色（赤丸・青四角・今日以外）
    let numColorClass = 'date-dark';
    if (dow === 0 || info.is_holiday) numColorClass = 'date-red';
    else if (dow === 6)               numColorClass = 'date-blue';

    const isToday = key === todayKey;

    // 日付インジケータ
    // 今日はグリーン二重丸を優先し、赤丸/青四角と重なる場合はoutlineで追加
    let dateHtml;
    if (isToday && hasMoeru) {
      dateHtml = `<span class="date-circle today-outline ${numColorClass}">${d}</span>`;
    } else if (isToday && hasShigen) {
      dateHtml = `<span class="date-square today-outline ${numColorClass}">${d}</span>`;
    } else if (isToday) {
      dateHtml = `<span class="date-today ${numColorClass}">${d}</span>`;
    } else if (hasMoeru) {
      dateHtml = `<span class="date-circle ${numColorClass}">${d}</span>`;
    } else if (hasShigen) {
      dateHtml = `<span class="date-square ${numColorClass}">${d}</span>`;
    } else {
      dateHtml = `<span class="date-plain ${numColorClass}">${d}</span>`;
    }

    // 例外マーク
    const excHtml = info.is_exception ? '<span class="exc-mark">⚠</span>' : '';

    // 祝日名
    const holHtml = info.holiday_name
      ? `<div style="font-size:7px;line-height:1.1;text-align:center" class="text-red-400 mt-0.5 w-full px-0.5">${info.holiday_name}</div>` : '';

    // スプレー缶
    const sprayHtml = hasSpray ? '<span class="spray-label">スプレー缶</span>' : '';

    cell.innerHTML = `
      ${excHtml}
      ${dateHtml}
      ${holHtml}
      ${sprayHtml}
    `;
    grid.appendChild(cell);
  }
}

function openModal(key, day, dow, info) {
  editingDate = key;
  document.getElementById('modal-title').textContent =
    `${year}年${month}月${day}日(${WEEKDAY_JP[dow]})　${district}地区`;

  const hol = document.getElementById('modal-holiday');
  if (info.holiday_name) { hol.textContent = `🎌 ${info.holiday_name}`; hol.classList.remove('hidden'); }
  else hol.classList.add('hidden');

  // チェックボックス（背景プレビュー付き）
  document.getElementById('modal-checkboxes').innerHTML = GARBAGE_TYPES.map(t => {
    const preview = {
      '燃やせるごみ':   `<span class="date-circle" style="width:18px;height:18px;font-size:9px;flex-shrink:0">例</span>`,
      '資源物':         `<span class="date-square" style="width:18px;height:18px;font-size:9px;flex-shrink:0">例</span>`,
      '燃やせないごみ': `<span style="width:18px;height:18px;background:#fbcfe8;border-radius:2px;flex-shrink:0;display:inline-block"></span>`,
      '燃えないごみ':   `<span style="width:18px;height:18px;background:#bfdbfe;border-radius:2px;flex-shrink:0;display:inline-block"></span>`,
      'スプレー缶':     `<span class="spray-label">缶</span>`,
    }[t] || '';
    return `
      <label class="flex items-center gap-2 cursor-pointer hover:bg-gray-50 px-2 py-1 rounded-lg">
        <input type="checkbox" value="${t}" ${info.types.includes(t) ? 'checked' : ''}
               class="w-4 h-4 accent-blue-500 flex-shrink-0">
        ${preview}
        <span class="text-sm text-gray-700">${t}</span>
      </label>`;
  }).join('');

  document.getElementById('modal').classList.remove('hidden');
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); editingDate = null; }
function closeModalBackdrop(e) { if (e.target === document.getElementById('modal')) closeModal(); }

async function saveCorrection() {
  const types = [...document.querySelectorAll('#modal-checkboxes input:checked')].map(el => el.value);
  await post(editingDate, types); closeModal();
}
async function setNoCollection() { await post(editingDate, []); closeModal(); }
async function revertToRule()    { await post(editingDate, null); closeModal(); }

async function post(dateKey, types) {
  await authFetch('/api/correction', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ district, date: dateKey, types }),
  });
  await loadSchedule();
}

function prevMonth() { month--; if (month < 1) { month = 12; year--; } loadSchedule(); }
function nextMonth() { month++; if (month > 12) { month = 1; year++; } loadSchedule(); }

// ------------------------------------------------------------------ //
//  広告ブロードキャスト管理                                             //
// ------------------------------------------------------------------ //
const DOW_JP = ['月', '火', '水', '木', '金', '土', '日'];
const SCHEDULE_JP = { weekly: '週１', biweekly: '隔週', monthly: '月１' };

// 月選択 <select> の options を動的生成
(function() {
  const sel = document.getElementById('bc-dom');
  if (sel && sel.children.length === 0) {
    for (let i = 1; i <= 28; i++) {
      const o = document.createElement('option');
      o.value = i; o.textContent = `${i}日`;
      sel.appendChild(o);
    }
  }
})();

function toggleNewForm() {
  const form = document.getElementById('new-broadcast-form');
  const icon = document.getElementById('form-toggle-icon');
  const hidden = form.classList.toggle('hidden');
  icon.textContent = hidden ? '▼' : '▲';
}

function updateBcFields() {
  const type     = document.querySelector('input[name="bc-type"]:checked')?.value || 'text';
  const schedule = document.getElementById('bc-schedule').value;
  document.getElementById('bc-text-field').classList.toggle('hidden', type !== 'text');
  document.getElementById('bc-image-fields').classList.toggle('hidden', type !== 'image');
  document.getElementById('bc-dow-field').classList.toggle('hidden', schedule === 'monthly');
  document.getElementById('bc-dom-field').classList.toggle('hidden', schedule !== 'monthly');
}

async function createBroadcast() {
  const name     = document.getElementById('bc-name').value.trim();
  const type     = document.querySelector('input[name="bc-type"]:checked')?.value || 'text';
  const schedule = document.getElementById('bc-schedule').value;
  const hour     = parseInt(document.getElementById('bc-hour').value);

  if (!name) { alert('名前を入力してください'); return; }

  const body = { name, type, schedule, hour, enabled: true };

  if (type === 'text') {
    const text = document.getElementById('bc-text').value.trim();
    if (!text) { alert('テキスト内容を入力してください'); return; }
    body.text = text;
  } else {
    const imageUrl = document.getElementById('bc-image-url').value.trim();
    if (!imageUrl) { alert('画像URLを入力してください'); return; }
    body.image_url  = imageUrl;
    body.preview_url = document.getElementById('bc-preview-url').value.trim() || imageUrl;
  }

  if (schedule !== 'monthly') {
    body.day_of_week = parseInt(document.getElementById('bc-dow').value);
  } else {
    body.day_of_month = parseInt(document.getElementById('bc-dom').value);
  }

  const res = await authFetch('/api/broadcasts', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) { alert('登録に失敗しました'); return; }

  // フォームリセット
  document.getElementById('bc-name').value = '';
  document.getElementById('bc-text').value = '';
  document.getElementById('bc-image-url').value = '';
  document.getElementById('bc-preview-url').value = '';
  document.getElementById('new-broadcast-form').classList.add('hidden');
  document.getElementById('form-toggle-icon').textContent = '▼';
  await loadBroadcasts();
}

async function loadBroadcasts() {
  const res = await authFetch('/api/broadcasts');
  const list = await res.json();
  renderBroadcasts(list);
}

function renderBroadcasts(list) {
  const container = document.getElementById('broadcast-list');
  const empty     = document.getElementById('broadcast-empty');
  container.innerHTML = '';

  if (!list || list.length === 0) {
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  list.forEach(b => {
    const scheduleLabel = _scheduleLabel(b);
    const typeLabel = b.type === 'image' ? '🖼 画像' : '💬 テキスト';
    const preview = b.type === 'text'
      ? (b.text || '').slice(0, 40) + ((b.text || '').length > 40 ? '…' : '')
      : b.image_url || '';

    const card = document.createElement('div');
    card.className = 'bg-white rounded-xl shadow-sm p-4';
    card.innerHTML = `
      <div class="flex items-start justify-between gap-2 mb-2">
        <div class="min-w-0">
          <div class="font-semibold text-gray-800 text-sm truncate">${escHtml(b.name)}</div>
          <div class="text-xs text-gray-500 mt-0.5">${typeLabel} ／ ${scheduleLabel}</div>
          <div class="text-xs text-gray-400 mt-0.5 truncate">${escHtml(preview)}</div>
        </div>
        <label class="flex items-center gap-1.5 flex-shrink-0 cursor-pointer">
          <span class="text-xs text-gray-500">${b.enabled ? '有効' : '無効'}</span>
          <div class="relative">
            <input type="checkbox" class="sr-only peer" ${b.enabled ? 'checked' : ''}
                   onchange="toggleBroadcast('${b.id}', this.checked)">
            <div class="w-9 h-5 bg-gray-200 peer-checked:bg-blue-500 rounded-full transition-colors peer-focus:ring-2 peer-focus:ring-blue-300"></div>
            <div class="absolute left-0.5 top-0.5 w-4 h-4 bg-white rounded-full transition-transform peer-checked:translate-x-4 shadow-sm"></div>
          </div>
        </label>
      </div>
      <div class="flex gap-2 mt-2">
        <button onclick="sendBroadcastNow('${b.id}')"
                class="flex-1 bg-green-500 hover:bg-green-600 text-white py-1.5 rounded-lg text-xs font-medium transition-colors">
          今すぐ送信
        </button>
        <button onclick="deleteBroadcast('${b.id}')"
                class="px-3 bg-gray-100 hover:bg-red-100 text-gray-500 hover:text-red-600 py-1.5 rounded-lg text-xs font-medium transition-colors">
          削除
        </button>
      </div>
    `;
    container.appendChild(card);
  });
}

function _scheduleLabel(b) {
  const base = SCHEDULE_JP[b.schedule] || b.schedule;
  const h = `${b.hour}:00`;
  if (b.schedule === 'monthly') return `${base} ${b.day_of_month}日 ${h}`;
  return `${base} ${DOW_JP[b.day_of_week]}曜 ${h}`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function sendBroadcastNow(bid) {
  if (!confirm('全ユーザーに今すぐ送信しますか？')) return;
  const res = await authFetch(`/api/broadcasts/${bid}/send`, { method: 'POST' });
  if (res.ok) alert('送信しました');
  else alert('送信に失敗しました');
}

async function toggleBroadcast(bid, enabled) {
  await authFetch(`/api/broadcasts/${bid}`, {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ enabled }),
  });
  await loadBroadcasts();
}

async function deleteBroadcast(bid) {
  if (!confirm('このスケジュールを削除しますか？')) return;
  await authFetch(`/api/broadcasts/${bid}`, { method: 'DELETE' });
  await loadBroadcasts();
}
</script>
