# fly.toml - Fly.io deployment configuration
# app name は `fly launch` 時に設定されます

app = "tobetsu-garbage-bot"
primary_region = "nrt"

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "tobetsu_data"
  destination = "/data"
  initial_size = "1gb"
